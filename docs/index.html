<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Shopping Circle Kottayam is coming soon." />
    <title>Shopping Circle Kottayam | Coming Soon</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #151820;
        --muted: #657082;
        --paper: #fff7f3;
        --white: #ffffff;
        --red: #cf2030;
        --red-deep: #8f1323;
        --coral: #e45d42;
        --gold: #f3c66f;
        --teal: #14b8a6;
        --green: #168a54;
        --violet: #6258d9;
        --line: rgba(21, 24, 32, 0.12);
        --shadow: 0 28px 90px rgba(52, 19, 28, 0.24);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        background:
          linear-gradient(120deg, rgba(255, 255, 255, 0.72) 0 1px, transparent 1px 20px),
          linear-gradient(180deg, #fffaf7 0%, #fff 42%, #f1fffb 100%);
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        margin: 0;
      }

      .page {
        display: grid;
        min-height: 100vh;
        overflow: hidden;
        place-items: center;
        position: relative;
        padding: clamp(1rem, 3vw, 2rem);
      }

      .page::before {
        background:
          linear-gradient(135deg, rgba(143, 19, 35, 0.94), rgba(207, 32, 48, 0.92) 52%, rgba(228, 93, 66, 0.92)),
          linear-gradient(90deg, rgba(255, 255, 255, 0.12) 1px, transparent 1px),
          linear-gradient(0deg, rgba(255, 255, 255, 0.1) 1px, transparent 1px);
        background-size: auto, 30px 30px, 30px 30px;
        clip-path: polygon(58% 0, 100% 0, 100% 100%, 44% 100%);
        content: "";
        inset: 0;
        position: absolute;
      }

      .page::after {
        background:
          repeating-linear-gradient(
            -18deg,
            transparent 0,
            transparent 15px,
            rgba(207, 32, 48, 0.055) 16px,
            rgba(207, 32, 48, 0.055) 17px
          );
        content: "";
        inset: 0;
        pointer-events: none;
        position: absolute;
      }

      .shell {
        align-items: center;
        display: grid;
        gap: clamp(2rem, 6vw, 4.5rem);
        grid-template-columns: minmax(0, 1fr);
        max-width: 1160px;
        position: relative;
        width: 100%;
        z-index: 1;
      }

      .copy {
        max-width: 650px;
        position: relative;
        z-index: 3;
      }

      .brand {
        align-items: center;
        display: inline-flex;
        gap: 0.8rem;
        margin-bottom: clamp(1.5rem, 4vw, 2.2rem);
      }

      .brand-mark {
        align-items: center;
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.24), rgba(255, 255, 255, 0)),
          linear-gradient(135deg, var(--red), var(--coral));
        border: 1px solid rgba(255, 255, 255, 0.62);
        border-radius: 16px;
        box-shadow: 0 18px 42px rgba(207, 32, 48, 0.26);
        color: #fff;
        display: inline-flex;
        height: 56px;
        justify-content: center;
        transform: rotate(-5deg);
        width: 56px;
      }

      .brand-text {
        display: grid;
        font-size: 1.05rem;
        font-weight: 950;
        line-height: 1.02;
      }

      .brand-text small {
        color: var(--muted);
        font-size: 0.78rem;
        font-weight: 850;
        margin-top: 0.18rem;
      }

      .label {
        align-items: center;
        background: rgba(255, 255, 255, 0.88);
        border: 1px solid rgba(207, 32, 48, 0.18);
        border-radius: 999px;
        box-shadow: 0 12px 34px rgba(52, 19, 28, 0.08);
        color: var(--red-deep);
        display: inline-flex;
        font-size: 0.78rem;
        font-weight: 950;
        gap: 0.45rem;
        margin-bottom: 1rem;
        min-height: 38px;
        padding: 0.45rem 0.78rem;
        text-transform: uppercase;
      }

      h1 {
        font-size: clamp(3.8rem, 15vw, 9.4rem);
        font-weight: 950;
        letter-spacing: 0;
        line-height: 0.82;
        margin: 0;
        text-wrap: balance;
      }

      .shine {
        background: linear-gradient(90deg, var(--ink), var(--red-deep) 42%, var(--red));
        background-clip: text;
        -webkit-background-clip: text;
        color: transparent;
      }

      .underline {
        background: linear-gradient(90deg, var(--red), var(--gold), var(--teal));
        border-radius: 999px;
        display: block;
        height: 8px;
        margin-top: clamp(1.1rem, 3vw, 1.5rem);
        max-width: 340px;
        overflow: hidden;
        position: relative;
      }

      .underline::after {
        animation: sweep 2.8s ease-in-out infinite;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.86), transparent);
        content: "";
        inset: 0;
        position: absolute;
        transform: translateX(-100%);
      }

      .stage {
        min-height: 570px;
        position: relative;
      }

      .halo {
        animation: slow-turn 18s linear infinite;
        border: 1px solid rgba(255, 255, 255, 0.34);
        border-radius: 36px;
        height: 420px;
        left: 50%;
        position: absolute;
        top: 50%;
        transform: translate(-50%, -50%) rotate(0deg);
        width: 420px;
      }

      .halo::before,
      .halo::after {
        background: rgba(255, 255, 255, 0.7);
        border-radius: 999px;
        content: "";
        height: 9px;
        position: absolute;
        width: 42px;
      }

      .halo::before {
        right: 42px;
        top: -5px;
      }

      .halo::after {
        bottom: -5px;
        left: 62px;
      }

      .phone {
        background: #151820;
        border: 10px solid #151820;
        border-radius: 38px;
        box-shadow: var(--shadow);
        height: 560px;
        left: 50%;
        overflow: hidden;
        position: absolute;
        top: 50%;
        transform: translate(-50%, -50%) rotate(4deg);
        width: min(78vw, 335px);
        z-index: 2;
      }

      .phone::before {
        background: #2b3040;
        border-radius: 999px;
        content: "";
        height: 5px;
        left: 50%;
        position: absolute;
        top: 12px;
        transform: translateX(-50%);
        width: 78px;
        z-index: 3;
      }

      .screen {
        background:
          linear-gradient(115deg, rgba(255, 255, 255, 0.12) 0 1px, transparent 1px 18px),
          linear-gradient(155deg, var(--red-deep) 0%, var(--red) 52%, var(--coral) 100%);
        border-radius: 26px;
        height: 100%;
        overflow: hidden;
        position: relative;
      }

      .screen::before {
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.22), transparent 42%),
          repeating-linear-gradient(
            90deg,
            rgba(255, 255, 255, 0.09) 0,
            rgba(255, 255, 255, 0.09) 1px,
            transparent 1px,
            transparent 26px
          );
        content: "";
        inset: 0;
        position: absolute;
      }

      .screen-top {
        background: rgba(255, 255, 255, 0.92);
        border-radius: 999px;
        height: 44px;
        left: 1.15rem;
        position: absolute;
        right: 1.15rem;
        top: 4.25rem;
      }

      .screen-top::before {
        background: var(--red);
        border-radius: 999px;
        content: "";
        height: 16px;
        left: 0.9rem;
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        width: 16px;
      }

      .screen-top::after {
        background: rgba(21, 24, 32, 0.14);
        border-radius: 999px;
        content: "";
        height: 12px;
        left: 2.2rem;
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        width: 54%;
      }

      .tiles {
        display: grid;
        gap: 0.72rem;
        left: 1.15rem;
        position: absolute;
        right: 1.15rem;
        top: 8.25rem;
      }

      .tile {
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid rgba(255, 255, 255, 0.68);
        border-radius: 14px;
        box-shadow: 0 14px 30px rgba(47, 13, 19, 0.1);
        height: 76px;
        position: relative;
      }

      .tile::before {
        border-radius: 12px;
        content: "";
        height: 48px;
        left: 0.78rem;
        position: absolute;
        top: 0.85rem;
        width: 48px;
      }

      .tile:nth-child(1)::before {
        background: linear-gradient(135deg, var(--teal), #7be0cf);
      }

      .tile:nth-child(2)::before {
        background: linear-gradient(135deg, var(--green), #97d86c);
      }

      .tile:nth-child(3)::before {
        background: linear-gradient(135deg, var(--violet), #44b7ef);
      }

      .tile::after {
        background:
          linear-gradient(rgba(21, 24, 32, 0.12), rgba(21, 24, 32, 0.12)) left top / 78% 12px no-repeat,
          linear-gradient(rgba(21, 24, 32, 0.08), rgba(21, 24, 32, 0.08)) left bottom / 52% 10px no-repeat;
        content: "";
        height: 34px;
        left: 4.55rem;
        position: absolute;
        right: 1rem;
        top: 1.2rem;
      }

      .bottom-card {
        background: rgba(255, 255, 255, 0.94);
        border-radius: 18px;
        bottom: 1rem;
        box-shadow: 0 18px 50px rgba(47, 13, 19, 0.18);
        height: 132px;
        left: 1.15rem;
        position: absolute;
        right: 1.15rem;
      }

      .bottom-card::before {
        background: linear-gradient(90deg, var(--gold), var(--red));
        border-radius: 999px;
        content: "";
        height: 8px;
        left: 1rem;
        position: absolute;
        right: 3.2rem;
        top: 1.2rem;
      }

      .bottom-card::after {
        background:
          linear-gradient(rgba(21, 24, 32, 0.12), rgba(21, 24, 32, 0.12)) 0 0 / 68% 14px no-repeat,
          linear-gradient(rgba(21, 24, 32, 0.08), rgba(21, 24, 32, 0.08)) 0 29px / 88% 11px no-repeat,
          linear-gradient(rgba(21, 24, 32, 0.08), rgba(21, 24, 32, 0.08)) 0 51px / 48% 11px no-repeat;
        content: "";
        inset: 2.6rem 1rem 1rem;
        position: absolute;
      }

      .ticket {
        animation: float-ticket 5.2s ease-in-out infinite;
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.96), rgba(255, 249, 242, 0.94));
        border: 1px solid rgba(255, 255, 255, 0.76);
        border-radius: 20px;
        box-shadow: 0 24px 58px rgba(45, 15, 21, 0.24);
        height: 154px;
        position: absolute;
        right: clamp(-0.2rem, 3vw, 1.2rem);
        top: 2rem;
        transform: rotate(-8deg);
        width: 216px;
        z-index: 4;
      }

      .ticket::before,
      .ticket::after {
        background: var(--red);
        border-radius: 50%;
        content: "";
        height: 26px;
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        width: 26px;
      }

      .ticket::before {
        left: -13px;
      }

      .ticket::after {
        right: -13px;
      }

      .ticket-icon {
        align-items: center;
        background: linear-gradient(135deg, rgba(207, 32, 48, 0.1), rgba(243, 198, 111, 0.34));
        border-radius: 18px;
        color: var(--red);
        display: inline-flex;
        height: 64px;
        justify-content: center;
        left: 50%;
        position: absolute;
        top: 50%;
        transform: translate(-50%, -50%);
        width: 64px;
      }

      .ticket-line {
        background: rgba(207, 32, 48, 0.16);
        border-radius: 999px;
        height: 13px;
        left: 1.2rem;
        position: absolute;
        top: 1.2rem;
        width: 56%;
      }

      .ticket-dash {
        border-top: 2px dashed rgba(21, 24, 32, 0.18);
        bottom: 1.25rem;
        left: 1.25rem;
        position: absolute;
        right: 1.25rem;
      }

      .bag {
        animation: float-bag 5.8s ease-in-out infinite;
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.22), rgba(255, 255, 255, 0.05)),
          #15231f;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 22px;
        bottom: 3rem;
        box-shadow: 0 20px 50px rgba(45, 15, 21, 0.2);
        color: #fff;
        height: 132px;
        left: clamp(-0.4rem, 4vw, 1.2rem);
        position: absolute;
        transform: rotate(7deg);
        width: 150px;
        z-index: 4;
      }

      .bag::before {
        border: 4px solid rgba(255, 255, 255, 0.88);
        border-bottom: 0;
        border-radius: 999px 999px 0 0;
        content: "";
        height: 34px;
        left: 50%;
        position: absolute;
        top: 1.1rem;
        transform: translateX(-50%);
        width: 54px;
      }

      .bag::after {
        background:
          linear-gradient(90deg, var(--gold), #fff) 0 0 / 76% 8px no-repeat,
          linear-gradient(rgba(255, 255, 255, 0.62), rgba(255, 255, 255, 0.62)) 0 23px / 58% 10px no-repeat;
        content: "";
        inset: 4.35rem 1rem 1rem;
        position: absolute;
      }

      .spark {
        animation: spark 3.4s ease-in-out infinite;
        color: rgba(255, 255, 255, 0.82);
        position: absolute;
        z-index: 5;
      }

      .spark-1 {
        right: 19%;
        top: 0.4rem;
      }

      .spark-2 {
        animation-delay: 0.6s;
        left: 14%;
        top: 6.4rem;
      }

      .spark-3 {
        animation-delay: 1.1s;
        bottom: 6.2rem;
        right: 7%;
      }

      svg {
        display: block;
      }

      @keyframes sweep {
        0%,
        28% {
          transform: translateX(-100%);
        }

        78%,
        100% {
          transform: translateX(100%);
        }
      }

      @keyframes slow-turn {
        from {
          transform: translate(-50%, -50%) rotate(0deg);
        }

        to {
          transform: translate(-50%, -50%) rotate(360deg);
        }
      }

      @keyframes float-ticket {
        0%,
        100% {
          transform: rotate(-8deg) translateY(0);
        }

        50% {
          transform: rotate(-4deg) translateY(-12px);
        }
      }

      @keyframes float-bag {
        0%,
        100% {
          transform: rotate(7deg) translateY(0);
        }

        50% {
          transform: rotate(10deg) translateY(10px);
        }
      }

      @keyframes spark {
        0%,
        100% {
          opacity: 0.42;
          transform: scale(0.9);
        }

        50% {
          opacity: 1;
          transform: scale(1.15);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
        }
      }

      @media (min-width: 860px) {
        .shell {
          grid-template-columns: minmax(0, 1fr) minmax(360px, 0.86fr);
        }
      }

      @media (max-width: 760px) {
        .page {
          align-items: start;
          padding-top: 1.4rem;
        }

        .page::before {
          clip-path: polygon(0 58%, 100% 44%, 100% 100%, 0 100%);
        }

        .copy {
          padding-top: 0.35rem;
        }

        h1 {
          max-width: 360px;
        }

        .stage {
          min-height: 430px;
        }

        .halo {
          height: 330px;
          width: 330px;
        }

        .phone {
          height: 440px;
          transform: translate(-50%, -50%) rotate(0deg);
          width: min(74vw, 278px);
        }

        .ticket {
          height: 124px;
          right: -0.2rem;
          top: -0.15rem;
          width: 172px;
        }

        .ticket-icon {
          border-radius: 15px;
          height: 52px;
          width: 52px;
        }

        .bag {
          bottom: 0.75rem;
          height: 104px;
          left: -0.25rem;
          width: 124px;
        }

        .spark-1 {
          right: 11%;
          top: 0.2rem;
        }

        .spark-2 {
          left: 4%;
          top: 5.5rem;
        }
      }

      @media (max-width: 380px) {
        .brand-mark {
          height: 50px;
          width: 50px;
        }

        h1 {
          font-size: 3.35rem;
        }

        .stage {
          min-height: 390px;
        }

        .halo {
          height: 292px;
          width: 292px;
        }

        .phone {
          height: 405px;
          width: min(72vw, 250px);
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="shell" aria-label="Coming soon">
        <div class="copy">
          <div class="brand">
            <span class="brand-mark" aria-hidden="true">
              <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
                <path
                  d="M7 8h14l-1.8 8.2a2 2 0 0 1-2 1.6H9.1a2 2 0 0 1-2-1.6L5.4 5H3"
                  stroke="currentColor"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2.2"
                />
                <path
                  d="M9.5 21a.5.5 0 1 0 0-1 .5.5 0 0 0 0 1Zm8 0a.5.5 0 1 0 0-1 .5.5 0 0 0 0 1Z"
                  stroke="currentColor"
                  stroke-linecap="round"
                  stroke-width="2.2"
                />
              </svg>
            </span>
            <span class="brand-text">
              Shopping Circle
              <small>Kottayam</small>
            </span>
          </div>

          <span class="label">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path
                d="m12 3 1.8 5.2L19 10l-5.2 1.8L12 17l-1.8-5.2L5 10l5.2-1.8L12 3Z"
                stroke="currentColor"
                stroke-linejoin="round"
                stroke-width="2"
              />
            </svg>
            Launching soon
          </span>
          <h1><span class="shine">Coming</span><br />Soon</h1>
          <span class="underline" aria-hidden="true"></span>
        </div>

        <div class="stage" aria-hidden="true">
          <span class="halo"></span>
          <span class="spark spark-1">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
              <path d="M12 3v18M3 12h18M6 6l12 12M18 6 6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
          </span>
          <span class="spark spark-2">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="m12 3 2 7 7 2-7 2-2 7-2-7-7-2 7-2 2-7Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round" />
            </svg>
          </span>
          <span class="spark spark-3">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
              <path d="m12 3 2 7 7 2-7 2-2 7-2-7-7-2 7-2 2-7Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round" />
            </svg>
          </span>

          <div class="ticket">
            <span class="ticket-line"></span>
            <span class="ticket-icon">
              <svg width="33" height="33" viewBox="0 0 24 24" fill="none">
                <path
                  d="M3 9a3 3 0 0 0 0 6v3a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-3a3 3 0 0 0 0-6V6a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v3Z"
                  stroke="currentColor"
                  stroke-linejoin="round"
                  stroke-width="2"
                />
              </svg>
            </span>
            <span class="ticket-dash"></span>
          </div>

          <div class="phone">
            <div class="screen">
              <span class="screen-top"></span>
              <div class="tiles">
                <span class="tile"></span>
                <span class="tile"></span>
                <span class="tile"></span>
              </div>
              <span class="bottom-card"></span>
            </div>
          </div>

          <span class="bag"></span>
        </div>
      </section>
    </main>
  </body>
</html>
